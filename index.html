<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Cool Dude RE576 🦖 Remi's Games</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦖</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; }

    body {
      background: #0a1a0a;
      color: white;
      font-family: 'Fredoka', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* Background */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(74,222,128,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(56,189,248,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(249,115,22,0.06) 0%, transparent 50%),
        #0a1a0a;
    }

    /* Stars */
    .stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .star {
      position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:0.8} }

    /* Header */
    .header {
      position: relative; z-index: 10;
      text-align: center; padding: 50px 20px 30px;
    }

    .dino-hero {
      font-size: 100px; display: inline-block;
      animation: bounce 2s infinite; cursor: pointer;
      -webkit-user-select: none; user-select: none;
      filter: drop-shadow(0 0 30px rgba(74,222,128,0.3));
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }

    .title {
      font-family: 'Bungee Shade', cursive;
      font-size: clamp(24px, 7vw, 52px);
      background: linear-gradient(135deg, #4ade80, #38bdf8, #fbbf24, #f97316, #ef4444);
      background-size: 400% 400%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbow 5s ease infinite;
      margin: 8px 0;
    }
    @keyframes rainbow { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

    .subtitle {
      font-size: clamp(18px, 4vw, 28px);
      color: #4ade80; font-weight: 700;
    }

    /* Games grid — tablet optimised */
    .games {
      position: relative; z-index: 10;
      max-width: 800px; margin: 0 auto;
      padding: 20px;
    }

    .section-label {
      font-family: 'Bungee Shade', cursive;
      font-size: clamp(18px, 4vw, 28px);
      text-align: center; color: #fbbf24;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (min-width: 700px) { .grid { grid-template-columns: repeat(3, 1fr); } }

    .card {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(74,222,128,0.15);
      border-radius: 24px;
      padding: 28px 16px;
      text-align: center;
      transition: all 0.2s;
      cursor: pointer;
      -webkit-user-select: none; user-select: none;
      position: relative;
      min-height: 180px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .card:active {
      transform: scale(0.95);
      border-color: #4ade80;
      background: rgba(74,222,128,0.12);
    }
    @media (hover:hover) {
      .card:hover {
        transform: translateY(-6px);
        border-color: #4ade80;
        box-shadow: 0 16px 50px rgba(74,222,128,0.15);
      }
    }

    .card-emoji { font-size: 56px; margin-bottom: 10px; display: block; }
    .card-title { font-size: 17px; font-weight: 700; color: white; margin-bottom: 4px; }
    .card-desc { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.3; }

    .badge {
      position: absolute; top: 10px; right: 10px;
      padding: 3px 10px; border-radius: 12px;
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .badge-new { background: #ef4444; color: white; }
    .badge-fav { background: #fbbf24; color: #1a1a1a; }
    .badge-soon { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }

    /* Add card */
    .card-add {
      border-style: dashed;
      border-color: rgba(255,255,255,0.1);
      background: transparent;
    }
    .card-add .card-emoji { opacity: 0.2; }
    .card-add .card-title { color: rgba(255,255,255,0.2); }

    /* Roar counter */
    .roar-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,26,10,0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(74,222,128,0.1);
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      z-index: 100; font-size: 14px;
    }
    .roar-btn {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none; border-radius: 20px;
      padding: 8px 20px; font-size: 16px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700; color: #0a1a0a;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .roar-btn:active { transform: scale(0.95); }

    /* Footer */
    .footer {
      position: relative; z-index: 10;
      text-align: center; padding: 40px 20px 80px;
      color: rgba(255,255,255,0.15); font-size: 11px;
    }

    /* Explosion particles */
    .particle {
      position: fixed; pointer-events: none; z-index: 999;
      font-size: 28px; animation: explode 0.8s forwards;
    }
    @keyframes explode {
      0% { opacity: 1; transform: scale(0.5) translate(0,0); }
      100% { opacity: 0; transform: scale(1.5) translate(var(--dx), var(--dy)); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="stars" id="stars"></div>

  <header class="header">
    <span class="dino-hero" id="hero" onclick="roar()">🦖</span>
    <h1 class="title">COOL DUDE RE576</h1>
    <p class="subtitle">🎮 Remi's Games 🎮</p>
  </header>

  <section class="games">
    <h2 class="section-label">🕹️ PLAY NOW 🕹️</h2>
    <div class="grid" id="grid"></div>
  </section>

  <footer class="footer">
    <p>Made with 🦕 by Remi & friends · 2026</p>
  </footer>

  <div class="roar-bar">
    <button class="roar-btn" onclick="roar()">🦖 ROAR!</button>
    <span id="roarCount" style="color:#4ade80;font-weight:700">0</span>
    <span style="color:rgba(255,255,255,0.3);font-size:12px">roars</span>
  </div>

  <script>
    // ─── GAMES LIST ─── Add your games here! ───────────────────────
    // To add a game:
    // 1. Save your Claude Code app as an HTML file
    // 2. Put it in the /games/ folder
    // 3. Add an entry below with the filename
    //
    const GAMES = [
      {
        emoji: '🦖',
        title: 'Dino Runner',
        desc: 'Jump over cacti!',
        url: 'games/dino-runner.html',
        badge: 'fav',
      },
      {
        emoji: '🧩',
        title: 'Puzzle Rex',
        desc: 'Solve dino puzzles!',
        url: 'games/puzzle-rex.html',
        badge: 'new',
      },
      {
        emoji: '🎨',
        title: 'Dino Painter',
        desc: 'Draw dinosaurs!',
        url: 'games/dino-painter.html',
        badge: 'new',
      },
      {
        emoji: '🔢',
        title: 'Math-a-saurus',
        desc: 'Math + dinosaurs!',
        url: 'games/math-a-saurus.html',
        badge: 'soon',
      },
      {
        emoji: '🏗️',
        title: 'Dino Builder',
        desc: 'Build a Jurassic Park!',
        url: 'games/dino-builder.html',
        badge: 'soon',
      },
      // ↓ Add more games here! ↓
    ];

    // ─── Render games ──────────────────────────────────────────────
    const grid = document.getElementById('grid');
    GAMES.forEach(g => {
      const card = document.createElement('div');
      card.className = 'card';
      const badgeHtml = g.badge === 'new' ? '<span class="badge badge-new">NEW</span>'
        : g.badge === 'fav' ? '<span class="badge badge-fav">⭐ FAV</span>'
        : g.badge === 'soon' ? '<span class="badge badge-soon">SOON</span>' : '';
      card.innerHTML = `${badgeHtml}<span class="card-emoji">${g.emoji}</span><p class="card-title">${g.title}</p><p class="card-desc">${g.desc}</p>`;
      card.onclick = () => { if (g.badge !== 'soon') window.location.href = g.url; };
      grid.appendChild(card);
    });

    // Add game card
    const addCard = document.createElement('div');
    addCard.className = 'card card-add';
    addCard.innerHTML = '<span class="card-emoji">➕</span><p class="card-title">Add Game</p><p class="card-desc">Drop your HTML file in /games/</p>';
    grid.appendChild(addCard);

    // ─── Roar! ─────────────────────────────────────────────────────
    let roars = 0;
    const emojis = ['💥','🔥','⚡','💫','🌟','☄️','🦴','🥚'];
    const dinos = ['🦖','🦕','🐊','🦎','🐉','🐲'];

    function roar() {
      roars++;
      document.getElementById('roarCount').textContent = roars;
      // Swap hero every 5 roars
      if (roars % 5 === 0) {
        document.getElementById('hero').textContent = dinos[Math.floor(Math.random() * dinos.length)];
      }
      // Particles
      for (let i = 0; i < 6; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = `${40 + Math.random() * 20}%`;
        p.style.top = `${10 + Math.random() * 20}%`;
        p.style.setProperty('--dx', `${(Math.random()-0.5)*200}px`);
        p.style.setProperty('--dy', `${(Math.random()-0.5)*200}px`);
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
      }
      // Vibrate on mobile
      if (navigator.vibrate) navigator.vibrate(50);
    }

    // ─── Stars ─────────────────────────────────────────────────────
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
      starsEl.appendChild(s);
    }
  </script>
</body>
</html>
