<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Wave Survival</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0e0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }
  #c {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #3a3a3a;
    box-shadow: 0 0 40px rgba(0,255,80,0.25), 0 0 80px rgba(0,255,80,0.1);
    max-width: 100vw;
    max-height: 100vh;
  }
  #hint {
    color: #444;
    font-size: 7px;
    font-family: 'Press Start 2P', monospace;
    margin-top: 8px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<canvas id="c" width="800" height="520"></canvas>
<div id="hint">ARROW KEYS / WASD + SPACE TO JUMP &nbsp;|&nbsp; STOMP SNAKES FROM ABOVE!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 800, H = 520;
const GRAV = 0.55;
const P_SPD = 5;
const JUMP = -14;
const BLOCK = 32;

// ---- PLATFORM LAYOUT (Minecraft grass/stone blocks) ----
const PLATFORMS = [
  { x:0,   y:472, w:800, h:48,  type:'grass' },
  { x:80,  y:376, w:160, h:32,  type:'grass' },
  { x:340, y:324, w:120, h:32,  type:'grass' },
  { x:564, y:376, w:156, h:32,  type:'grass' },
  { x:180, y:260, w:128, h:32,  type:'stone' },
  { x:492, y:260, w:128, h:32,  type:'stone' },
  { x:310, y:188, w:180, h:32,  type:'grass' },
];

// ---- WAVE CONFIG ----
const WAVES = [
  { coinsNeeded:4,  killsNeeded:5,  label:'WAVE 1 - BEGINNERS LUCK' },
  { coinsNeeded:7,  killsNeeded:10, label:'WAVE 2 - GETTING WARMER' },
  { coinsNeeded:10, killsNeeded:15, label:'WAVE 3 - HERE THEY COME!' },
  { coinsNeeded:12, killsNeeded:18, label:'WAVE 4 - BOSS TIME!', boss:true },
  { coinsNeeded:15, killsNeeded:22, label:'WAVE 5 - FINAL STAND!' },
];
const WAVE_SECS = 75;

// ---- STATE ----
let gs = 'menu'; // menu | playing | waveClear | gameOver
let wave = 0;
let score = 0;
let player, snakes, coins, particles, boss;
let coinsCollected = 0;
let killCount = 0;
let waveTimer = 0;
let spawnT = 0;
let frameN = 0;
let waveDoneTimer = -1;
let waveLabel = '';
let labelTimer = 0;
window.keys = {}; const keys = window.keys;

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key.startsWith('Arrow')) e.preventDefault();
  if (gs === 'menu'      && (e.key === ' ' || e.key === 'Enter')) startGame();
  if (gs === 'waveClear' && (e.key === ' ' || e.key === 'Enter')) nextWave();
  if (gs === 'gameOver'  && (e.key === ' ' || e.key === 'Enter')) { wave=0; score=0; startGame(); }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// =========================================================
//  PLAYER
// =========================================================
class Player {
  constructor() {
    this.x=376; this.y=410;
    this.w=28; this.h=44;
    this.vx=0; this.vy=0;
    this.onGround=false;
    this.hp=5; this.maxHp=5;
    this.inv=0;
    this.facing=1;
    this.jumpHeld=false;
    this.anim=0;
    this.waveDone=false;
  }
  update() {
    this.vx=0;
    if (keys['ArrowLeft']||keys['a']||keys['A'])  { this.vx=-P_SPD; this.facing=-1; }
    if (keys['ArrowRight']||keys['d']||keys['D']) { this.vx=P_SPD;  this.facing=1;  }
    const jk = keys['ArrowUp']||keys['w']||keys['W']||keys[' '];
    if (jk && !this.jumpHeld && this.onGround) { this.vy=JUMP; this.jumpHeld=true; }
    if (!jk) this.jumpHeld=false;
    this.vy = Math.min(this.vy+GRAV, 18);
    this.x += this.vx;
    this.y += this.vy;
    this.x = Math.max(0, Math.min(W-this.w, this.x));
    if (this.y > H+80) { this.hit(1); this.x=376; this.y=350; this.vy=0; }
    this.onGround=false;
    for (const p of PLATFORMS) this._resolveP(p);
    if (this.inv>0) this.inv--;
    this.anim=(this.anim+0.18)%4;
  }
  _resolveP(p) {
    if (this.x+this.w<=p.x || this.x>=p.x+p.w) return;
    const foot = this.y+this.h;
    const prevFoot = foot-this.vy;
    if (this.vy>=0 && prevFoot<=p.y+2 && foot>=p.y) {
      this.y=p.y-this.h; this.vy=0; this.onGround=true;
    } else if (this.vy<0 && prevFoot>=p.y+p.h-2 && this.y<=p.y+p.h) {
      this.y=p.y+p.h; this.vy=0;
    }
  }
  hit(n) {
    if (this.inv>0) return;
    this.hp-=n; this.inv=90;
    burst(this.x+14, this.y+22, '#ff4444', 10);
    if (this.hp<=0) { this.hp=0; gs='gameOver'; }
  }
  draw() {
    if (this.inv>0 && Math.floor(this.inv/5)%2===0) return;
    const px=Math.round(this.x), py=Math.round(this.y);
    ctx.save();
    ctx.translate(this.facing===-1 ? px+this.w : px, py);
    ctx.scale(this.facing,1);
    // Cape
    ctx.fillStyle='#00cc44';
    ctx.fillRect(0,10,7,26);
    // Body
    ctx.fillStyle='#111';
    ctx.fillRect(6,6,20,28);
    // Chest S
    ctx.fillStyle='#00ff55';
    ctx.fillRect(10,11,10,3);
    ctx.fillRect(10,15,10,3);
    ctx.fillRect(10,19,10,3);
    ctx.fillRect(10,11,3,5);
    ctx.fillRect(17,15,3,5);
    // Head
    ctx.fillStyle='#111';
    ctx.fillRect(4,-14,22,18);
    // Mask
    ctx.fillStyle='#00cc44';
    ctx.fillRect(4,-13,22,8);
    // Eyes
    ctx.fillStyle='#fff';
    ctx.fillRect(9,-11,5,5); ctx.fillRect(18,-11,5,5);
    ctx.fillStyle='#000';
    ctx.fillRect(11,-10,2,2); ctx.fillRect(20,-10,2,2);
    // Legs
    ctx.fillStyle='#111';
    const lo = this.onGround ? Math.sin(this.anim*Math.PI)*4 : 0;
    ctx.fillRect(6,34,9,14+lo); ctx.fillRect(17,34,9,14-lo);
    // Boots
    ctx.fillStyle='#00aa33';
    ctx.fillRect(5,44+lo,11,5); ctx.fillRect(16,44-lo,11,5);
    // Gloves
    ctx.fillStyle='#00cc44';
    ctx.fillRect(0,14,6,9); ctx.fillRect(22,14,6,9);
    ctx.restore();
  }
}

// =========================================================
//  SNAKE ENEMY
// =========================================================
class Snake {
  constructor(x, y, fast, big) {
    this.x=x; this.y=y;
    this.big=big;
    this.w=big?60:44; this.h=big?28:20;
    const spd=(big?1.2:1.4)*(fast?1.8:1);
    this.vx=(Math.random()>0.5?1:-1)*spd;
    this.vy=0;
    this.onGround=false;
    this.alive=true;
    this.anim=Math.random()*Math.PI*2;
    this.tongueT=0;
  }
  update() {
    this.vy=Math.min(this.vy+GRAV,16);
    this.x+=this.vx; this.y+=this.vy;
    if (this.x<-this.w-10) this.x=W+5;
    if (this.x>W+10)       this.x=-this.w-5;
    this.onGround=false;
    for (const p of PLATFORMS) {
      if (this.x+this.w<=p.x||this.x>=p.x+p.w) continue;
      const foot=this.y+this.h, prev=foot-this.vy;
      if (this.vy>=0 && prev<=p.y+2 && foot>=p.y) {
        this.y=p.y-this.h; this.vy=0; this.onGround=true;
      }
    }
    // Bounce off screen edges
    if (this.x<=0 && this.vx<0) this.vx=-this.vx;
    if (this.x+this.w>=W && this.vx>0) this.vx=-this.vx;
    this.anim+=0.12;
    this.tongueT=Math.max(0,this.tongueT-1);
    if (Math.random()<0.015) this.tongueT=25;
  }
  draw() {
    const x=Math.round(this.x), y=Math.round(this.y);
    const flip=this.vx<0;
    ctx.save();
    ctx.translate(flip?x+this.w:x, y);
    ctx.scale(flip?-1:1,1);
    const W2=this.w, H2=this.h;
    const sc=this.big?1.35:1;
    ctx.scale(sc,sc);
    // Shadow body
    ctx.fillStyle='#1f5e1f';
    ctx.fillRect(1,H2*0.3,W2/sc-2,H2*0.7/sc);
    // Main body
    ctx.fillStyle='#3a9a3a';
    ctx.fillRect(0,4,W2/sc,H2*0.8/sc);
    // Scale pattern
    ctx.fillStyle='#2a7a2a';
    for (let i=0;i<4;i++) {
      ctx.fillRect(i*9+1,5,5,4);
      ctx.fillRect(i*9+5,10,5,4);
    }
    // Head
    ctx.fillStyle='#4db34d';
    ctx.fillRect(28/sc,0,16/sc,H2*0.9/sc);
    ctx.fillStyle='#2a7a2a';
    ctx.fillRect(28/sc,H2*0.55/sc,16/sc,H2*0.35/sc);
    // Eye
    ctx.fillStyle=this.big?'#ff6600':'#ffee00';
    ctx.fillRect(36/sc,2/sc,7/sc,6/sc);
    ctx.fillStyle='#000';
    ctx.fillRect(38/sc,3/sc,3/sc,3/sc);
    // Tongue
    if (this.tongueT>12) {
      ctx.fillStyle='#ff3333';
      ctx.fillRect(44/sc,7/sc,9/sc,2/sc);
      ctx.fillRect(49/sc,5/sc,2/sc,2/sc);
      ctx.fillRect(49/sc,9/sc,2/sc,2/sc);
    }
    // Tail tip
    ctx.fillStyle='#1f5e1f';
    ctx.fillRect(0,6/sc,3/sc,8/sc);
    ctx.restore();
  }
}

// =========================================================
//  COIN
// =========================================================
class Coin {
  constructor(x,y){ this.x=x; this.y=y; this.w=18; this.h=18; this.t=Math.random()*Math.PI*2; }
  update(){ this.t+=0.06; }
  draw(){
    const cx=this.x+9, cy=this.y+9;
    const wob=Math.cos(this.t);
    const hw=Math.max(1,Math.abs(wob)*7);
    // Glow
    ctx.fillStyle='rgba(255,215,0,0.18)';
    ctx.beginPath(); ctx.arc(cx,cy,13,0,Math.PI*2); ctx.fill();
    // Body
    ctx.fillStyle='#ffd700';
    ctx.fillRect(cx-hw,cy-8,hw*2,16);
    // Shine
    if (wob>0.2) { ctx.fillStyle='#fff9b0'; ctx.fillRect(cx-hw+1,cy-7,Math.max(1,hw/2),14); }
    // Label
    if (Math.abs(wob)>0.4) {
      ctx.fillStyle='#b8860b'; ctx.font='bold 9px monospace';
      ctx.textAlign='center'; ctx.fillText('G',cx,cy+4); ctx.textAlign='left';
    }
  }
}

// =========================================================
//  BOSS
// =========================================================
class Boss {
  constructor(){
    this.x=360; this.y=380;
    this.w=88; this.h=80;
    this.vx=1.8; this.vy=0;
    this.hp=25; this.maxHp=25;
    this.onGround=false;
    this.anim=0;
    this.shootT=0;
    this.projs=[];
    this.jumpT=0;
  }
  update(){
    this.vy=Math.min(this.vy+GRAV*0.8,14);
    this.x+=this.vx; this.y+=this.vy;
    if (this.x<=0) { this.x=0; this.vx=Math.abs(this.vx); }
    if (this.x+this.w>=W) { this.x=W-this.w; this.vx=-Math.abs(this.vx); }
    this.onGround=false;
    for (const p of PLATFORMS) {
      if (this.x+this.w<=p.x||this.x>=p.x+p.w) continue;
      const foot=this.y+this.h, prev=foot-this.vy;
      if (this.vy>=0 && prev<=p.y+4 && foot>=p.y) {
        this.y=p.y-this.h; this.vy=0; this.onGround=true;
      }
    }
    // Periodic jump
    this.jumpT++;
    if (this.jumpT>180 && this.onGround) { this.vy=JUMP*0.8; this.jumpT=0; }
    // Shoot
    this.shootT++;
    if (this.shootT>90) {
      this.shootT=0;
      for (let i=0;i<3;i++) {
        const a=(Math.PI/4)+i*(Math.PI/4);
        this.projs.push({ x:this.x+this.w/2, y:this.y+20, vx:Math.cos(a)*5, vy:-Math.abs(Math.sin(a))*4, life:130 });
      }
    }
    this.projs=this.projs.filter(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; return p.life>0&&p.y<H+10;
    });
    this.anim+=0.08;
  }
  checkHit(pl){
    // Projectile hit player
    for (const p of this.projs) {
      if (p.x>pl.x&&p.x<pl.x+pl.w&&p.y>pl.y&&p.y<pl.y+pl.h) { p.life=0; pl.hit(1); }
    }
    // Body contact
    if (pl.x+pl.w>this.x+8&&pl.x<this.x+this.w-8&&pl.y+pl.h>this.y+10&&pl.y<this.y+this.h) pl.hit(1);
  }
  draw(){
    const x=Math.round(this.x), y=Math.round(this.y);
    // Left horn
    ctx.fillStyle='#6b0000';
    ctx.beginPath(); ctx.moveTo(x+14,y-2); ctx.lineTo(x-2,y-48); ctx.lineTo(x+30,y-8); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff3300';
    ctx.beginPath(); ctx.moveTo(x+16,y-4); ctx.lineTo(x+4,y-34); ctx.lineTo(x+26,y-8); ctx.closePath(); ctx.fill();
    // Right horn
    ctx.fillStyle='#6b0000';
    ctx.beginPath(); ctx.moveTo(x+this.w-14,y-2); ctx.lineTo(x+this.w+2,y-48); ctx.lineTo(x+this.w-30,y-8); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff3300';
    ctx.beginPath(); ctx.moveTo(x+this.w-16,y-4); ctx.lineTo(x+this.w-4,y-34); ctx.lineTo(x+this.w-26,y-8); ctx.closePath(); ctx.fill();
    // Body
    ctx.fillStyle='#3a0000';
    ctx.fillRect(x,y,this.w,this.h);
    ctx.fillStyle='#550000';
    ctx.fillRect(x+4,y+4,this.w-8,this.h-8);
    // Body veins
    ctx.fillStyle='#8b0000';
    ctx.fillRect(x+12,y+8,4,this.h-16); ctx.fillRect(x+72,y+8,4,this.h-16);
    ctx.fillRect(x+8,y+30,this.w-16,4);
    // LOTS OF EYES (8 eyes)
    const eyes=[
      [10,12],[26,6],[42,12],[58,6],[74,12],
      [18,34],[44,40],[70,34]
    ];
    for (const [ex,ey] of eyes) {
      ctx.fillStyle='rgba(255,80,0,0.35)';
      ctx.beginPath(); ctx.arc(x+ex,y+ey,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ff8800';
      ctx.beginPath(); ctx.arc(x+ex,y+ey,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffee00';
      ctx.beginPath(); ctx.arc(x+ex,y+ey,3,0,Math.PI*2); ctx.fill();
      const pupX=Math.cos(this.anim+ex*0.3)*2;
      const pupY=Math.sin(this.anim+ex*0.3)*1.5;
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(x+ex+pupX,y+ey+pupY,1.5,0,Math.PI*2); ctx.fill();
    }
    // Mouth
    ctx.fillStyle='#cc1100';
    ctx.fillRect(x+12,y+58,this.w-24,10);
    ctx.fillStyle='#fff';
    for (let i=0;i<5;i++) ctx.fillRect(x+14+i*12,y+58,7,6);
    // Drool
    ctx.fillStyle='rgba(180,0,0,0.6)';
    for (let i=0;i<3;i++) {
      const dh=6+Math.sin(this.anim+i)*4;
      ctx.fillRect(x+18+i*16,y+68,4,dh);
    }
    // Projectiles
    for (const p of this.projs) {
      ctx.fillStyle='#ff4400';
      ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffaa00';
      ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
    }
  }
}

// =========================================================
//  PARTICLES
// =========================================================
function burst(x,y,col,n){
  for (let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*4;
    particles.push({ x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2,
      life:25+Math.random()*25, max:50, col, sz:2+Math.random()*4 });
  }
}
function tickParticles(){
  particles=particles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; return p.life>0; });
}
function drawParticles(){
  for (const p of particles){
    ctx.globalAlpha=p.life/p.max; ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  } ctx.globalAlpha=1;
}

// =========================================================
//  BLOCK DRAWING
// =========================================================
function drawBlock(x,y,w,h,type){
  const cols=Math.ceil(w/BLOCK), rows=Math.ceil(h/BLOCK);
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++){
    const bx=x+c*BLOCK, by=y+r*BLOCK;
    const bw=Math.min(BLOCK,x+w-bx), bh=Math.min(BLOCK,y+h-by);
    if (type==='grass') {
      if (r===0) {
        ctx.fillStyle='#5d9b3a'; ctx.fillRect(bx,by,bw,9);
        ctx.fillStyle='#4a8428'; ctx.fillRect(bx,by+2,bw,5);
        ctx.fillStyle='#8b6448'; ctx.fillRect(bx,by+9,bw,bh-9);
        ctx.fillStyle='#7a5338'; ctx.fillRect(bx+2,by+11,bw-4,bh-13);
        // Grass tufts
        ctx.fillStyle='#6aaa44';
        for (let g=0;g<3;g++) ctx.fillRect(bx+g*Math.floor(bw/3)+2,by-3,3,4);
      } else {
        ctx.fillStyle='#8b6448'; ctx.fillRect(bx,by,bw,bh);
        ctx.fillStyle='#7a5338'; ctx.fillRect(bx+2,by+2,bw-4,bh-4);
        // Dirt spots
        ctx.fillStyle='#6a4428';
        ctx.fillRect(bx+4,by+4,6,5); ctx.fillRect(bx+bw-10,by+6,5,4);
      }
    } else { // stone
      ctx.fillStyle='#7a7a7a'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#686868'; ctx.fillRect(bx+2,by+2,bw-4,bh-4);
      ctx.fillStyle='#888';    ctx.fillRect(bx+2,by+2,bw/2-2,bh/2-2);
      ctx.fillStyle='#595959'; ctx.fillRect(bx+2,by+bh/2,bw/2-2,bh/2-2);
    }
    ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  }
}

// =========================================================
//  SKY + STARS
// =========================================================
const STARS=Array.from({length:30},()=>({ x:Math.random()*800, y:Math.random()*260, sz:Math.random()>0.7?3:2 }));
const CLOUDS=[
  {x:60,y:50,w:90,h:36},{x:320,y:30,w:120,h:40},{x:620,y:60,w:100,h:35}
];
function drawWorld(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0b1e3e'); grad.addColorStop(0.55,'#163561'); grad.addColorStop(1,'#2a5e8e');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  // Stars
  for (const s of STARS) {
    const tw=Math.sin(frameN*0.02+s.x)*0.4+0.7;
    ctx.globalAlpha=tw; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.sz,s.sz);
  } ctx.globalAlpha=1;
  // Moon
  ctx.fillStyle='#e8e0c0'; ctx.beginPath(); ctx.arc(740,55,26,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c8c0a0'; for (let i=0;i<4;i++) { ctx.beginPath(); ctx.arc(730+i*5,50+i*3,4,0,Math.PI*2); ctx.fill(); }
  // Clouds (pixel style)
  for (const cl of CLOUDS) {
    ctx.fillStyle='rgba(180,210,255,0.18)';
    ctx.fillRect(cl.x,cl.y,cl.w,cl.h);
    ctx.fillRect(cl.x+8,cl.y-10,cl.w-16,12);
  }
  // Platforms
  for (const p of PLATFORMS) drawBlock(p.x,p.y,p.w,p.h,p.type);
}

// =========================================================
//  SPAWN HELPERS
// =========================================================
function spawnCoin(){
  const p=PLATFORMS[Math.floor(Math.random()*PLATFORMS.length)];
  coins.push(new Coin(p.x+8+Math.random()*(p.w-30), p.y-22));
}
function spawnSnake(){
  const wave_ = wave;
  const fast  = wave_>1 && Math.random()<0.35;
  const big   = wave_>2 && Math.random()<0.2;
  const side  = Math.random()>0.5;
  const px    = side ? -50 : W+10;
  const platI = Math.floor(1+Math.random()*(PLATFORMS.length-1));
  const p     = PLATFORMS[platI];
  const s     = new Snake(px, p.y-25, fast, big);
  s.vx = side ? Math.abs(s.vx) : -Math.abs(s.vx);
  snakes.push(s);
}

// =========================================================
//  GAME FLOW
// =========================================================
function startGame(){
  gs='playing'; initWave();
}
function initWave(){
  const cfg=WAVES[Math.min(wave,WAVES.length-1)];
  player=new Player();
  snakes=[]; coins=[]; particles=[]; boss=null;
  coinsCollected=0; killCount=0;
  waveTimer=WAVE_SECS*60; spawnT=0; frameN=0; waveDoneTimer=-1;
  waveLabel=cfg.label; labelTimer=180;
  for (let i=0;i<7;i++) spawnCoin();
  if (cfg.boss) boss=new Boss();
}
function nextWave(){ wave++; gs='playing'; initWave(); }

// =========================================================
//  HUD
// =========================================================
function drawHUD(){
  const cfg=WAVES[Math.min(wave,WAVES.length-1)];
  const secs=Math.ceil(waveTimer/60);
  // Left panel
  rPanel(10,10,210,96,'#001800','#00ff44');
  ctx.fillStyle='#00ff44'; ctx.font='11px "Press Start 2P"';
  ctx.fillText('WAVE '+(wave+1), 22,32);
  const tc=secs<20?'#ff4444':'#ffffff';
  ctx.fillStyle=tc; ctx.font='9px "Press Start 2P"';
  ctx.fillText('TIME: '+secs+'s', 22,52);
  ctx.fillStyle='#ffd700'; ctx.fillText('COINS '+coinsCollected+'/'+cfg.coinsNeeded, 22,68);
  ctx.fillStyle='#ff8866'; ctx.fillText('KILLS '+killCount+'/'+cfg.killsNeeded, 22,84);
  // Health (right panel)
  rPanel(W-186,10,176,56,'#180000','#ff4444');
  ctx.fillStyle='#ff4444'; ctx.font='8px "Press Start 2P"'; ctx.fillText('HEALTH',W-174,28);
  for (let i=0;i<player.maxHp;i++){
    if (i<player.hp) { drawHeart(W-174+i*28,32,'#ff3333'); }
    else { ctx.fillStyle='#330000'; ctx.fillRect(W-174+i*28,32,22,20); }
  }
  // Score
  rPanel(W/2-80,10,160,38,'#00001a','#4488ff');
  ctx.fillStyle='#88aaff'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText(''+score+' pts',W/2,34); ctx.textAlign='left';
  // Boss HP bar
  if (boss){
    rPanel(W/2-160,H-52,320,40,'#1a0000','#aa0000');
    ctx.fillStyle='#ff2200'; ctx.font='8px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('BIG BOSS HP',W/2,H-38); ctx.textAlign='left';
    ctx.fillStyle='#220000'; ctx.fillRect(W/2-145,H-30,290,14);
    const bw=Math.round((boss.hp/boss.maxHp)*290);
    const gc=ctx.createLinearGradient(W/2-145,0,W/2+145,0);
    gc.addColorStop(0,'#ff2200'); gc.addColorStop(1,'#ff8800');
    ctx.fillStyle=gc; ctx.fillRect(W/2-145,H-30,bw,14);
    ctx.strokeStyle='#ff4400'; ctx.lineWidth=2; ctx.strokeRect(W/2-145,H-30,290,14);
  }
  // Wave progress arrows
  const ck=coinsCollected>=cfg.coinsNeeded, kk=killCount>=cfg.killsNeeded;
  if (ck) { ctx.fillStyle='#00ff44'; ctx.font='8px "Press Start 2P"'; ctx.fillText('✓',160,68); }
  if (kk) { ctx.fillStyle='#00ff44'; ctx.font='8px "Press Start 2P"'; ctx.fillText('✓',160,84); }
  // Wave label banner
  if (labelTimer>0){
    labelTimer--;
    const a=Math.min(1,labelTimer/30)*Math.min(1,(180-labelTimer)/30+0.5); // fade
    // Actually just use constant alpha for first 120 frames
    ctx.globalAlpha=labelTimer>30?1:labelTimer/30;
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,H/2-28,W,46);
    ctx.fillStyle='#00ff88'; ctx.font='14px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText(waveLabel,W/2,H/2+4); ctx.textAlign='left'; ctx.globalAlpha=1;
  }
}

function rPanel(x,y,w,h,bg,border){
  ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=border; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
}
function drawHeart(x,y,col){
  ctx.fillStyle=col;
  ctx.fillRect(x,y+4,22,14);
  ctx.fillRect(x+2,y,8,6); ctx.fillRect(x+12,y,8,6);
  ctx.fillStyle='rgba(255,180,180,0.5)'; ctx.fillRect(x+3,y+2,4,3);
}

// =========================================================
//  SCREENS
// =========================================================
function drawMenu(){
  drawWorld();
  // Title block
  ctx.fillStyle='rgba(0,10,0,0.82)'; ctx.fillRect(80,60,640,390);
  ctx.strokeStyle='#00ff44'; ctx.lineWidth=3; ctx.strokeRect(80,60,640,390);
  ctx.strokeStyle='#005500'; ctx.lineWidth=1;
  ctx.strokeRect(86,66,628,378);
  // Title
  ctx.textAlign='center';
  ctx.fillStyle='#00ff44'; ctx.font='30px "Press Start 2P"'; ctx.fillText('SNAKE WAVE',W/2,130);
  ctx.fillStyle='#ffd700'; ctx.font='26px "Press Start 2P"'; ctx.fillText('SURVIVAL',W/2,172);
  // Divider
  ctx.fillStyle='#005500'; ctx.fillRect(100,185,600,2);
  // Instructions
  ctx.fillStyle='#aaffaa'; ctx.font='8px "Press Start 2P"';
  ctx.fillText('Collect GOLD COINS + STOMP SNAKES to advance!',W/2,218);
  ctx.fillStyle='#888'; ctx.font='7px "Press Start 2P"';
  ctx.fillText('ARROW KEYS / WASD = Move & Jump',W/2,250);
  ctx.fillText('SPACE = Jump',W/2,270);
  ctx.fillText('LAND ON TOP of snakes to defeat them!',W/2,290);
  ctx.fillText('5 WAVES of snake mayhem await you!',W/2,318);
  // Blinking start
  const bl=Math.floor(Date.now()/500)%2;
  if (bl){ ctx.fillStyle='#00ff44'; ctx.font='11px "Press Start 2P"'; ctx.fillText('▶  PRESS SPACE TO START  ◀',W/2,385); }
  ctx.textAlign='left';
}

function drawWaveClear(){
  drawWorld();
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  // Glowing title
  ctx.shadowColor='#00ff44'; ctx.shadowBlur=20;
  ctx.fillStyle='#00ff44'; ctx.font='26px "Press Start 2P"'; ctx.fillText('WAVE CLEAR!',W/2,190);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffd700'; ctx.font='11px "Press Start 2P"'; ctx.fillText('SCORE: '+score,W/2,240);
  ctx.fillStyle='#aaffaa'; ctx.font='8px "Press Start 2P"';
  ctx.fillText('COINS: '+coinsCollected+' | KILLS: '+killCount, W/2,272);
  const hasNext=wave+1<WAVES.length;
  if (hasNext){
    const bl=Math.floor(Date.now()/500)%2;
    if (bl){ ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"'; ctx.fillText('PRESS SPACE - NEXT WAVE!',W/2,330); }
  } else {
    ctx.fillStyle='#ffd700'; ctx.font='14px "Press Start 2P"'; ctx.fillText('YOU WIN! HERO!',W/2,330);
    const bl=Math.floor(Date.now()/500)%2;
    if (bl){ ctx.fillStyle='#00ff44'; ctx.font='9px "Press Start 2P"'; ctx.fillText('PRESS SPACE TO PLAY AGAIN',W/2,370); }
  }
  ctx.textAlign='left';
}

function drawGameOver(){
  drawWorld();
  ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#ff3333'; ctx.shadowBlur=20;
  ctx.fillStyle='#ff3333'; ctx.font='28px "Press Start 2P"'; ctx.fillText('GAME OVER',W/2,195);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ff8866'; ctx.font='10px "Press Start 2P"'; ctx.fillText('FINAL SCORE: '+score,W/2,248);
  ctx.fillStyle='#888'; ctx.font='9px "Press Start 2P"'; ctx.fillText('REACHED WAVE '+(wave+1),W/2,276);
  const bl=Math.floor(Date.now()/500)%2;
  if (bl){ ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"'; ctx.fillText('PRESS SPACE TO TRY AGAIN',W/2,340); }
  ctx.textAlign='left';
}

// =========================================================
//  MAIN LOOP
// =========================================================
function loop(){
  ctx.clearRect(0,0,W,H);
  frameN++;

  if (gs==='menu')      { drawMenu();     requestAnimationFrame(loop); return; }
  if (gs==='waveClear') { drawWaveClear();requestAnimationFrame(loop); return; }
  if (gs==='gameOver')  { drawGameOver(); requestAnimationFrame(loop); return; }

  // ---- PLAYING ----
  drawWorld();

  // Wave timer
  waveTimer--;
  if (waveTimer<=0) {
    const cfg=WAVES[Math.min(wave,WAVES.length-1)];
    if (coinsCollected>=cfg.coinsNeeded && killCount>=cfg.killsNeeded) gs='waveClear';
    else gs='gameOver';
  }

  // Spawn rate: ramps up over wave duration
  const prog=1-(waveTimer/(WAVE_SECS*60));
  const interval=Math.max(28, 200-prog*180);
  spawnT++;
  if (spawnT>=interval){ spawnT=0; spawnSnake(); if (prog>0.65) spawnSnake(); }
  if (coins.length<6 && Math.random()<0.008) spawnCoin();

  // Update
  player.update();
  for (const s of snakes) s.update();
  for (const c of coins)  c.update();
  if (boss) { boss.update(); boss.checkHit(player); }
  tickParticles();

  // Player vs Snakes
  snakes=snakes.filter(s=>{
    // Stomp detection - generous hitbox for kids
    const stomping = player.vy>0
      && player.x+player.w>s.x+4 && player.x<s.x+s.w-4
      && player.y+player.h>s.y   && player.y+player.h<s.y+16;
    if (stomping){
      player.vy=JUMP*0.6;
      burst(s.x+s.w/2,s.y+s.h/2,'#44ff44',10);
      burst(s.x+s.w/2,s.y+s.h/2,'#ffd700',5);
      killCount++; score+=10; return false;
    }
    // Side contact
    if (player.inv===0
      && player.x+player.w>s.x+6 && player.x<s.x+s.w-6
      && player.y+player.h>s.y+3 && player.y<s.y+s.h) {
      player.hit(1);
    }
    return s.alive;
  });

  // Player vs Boss stomp
  if (boss && player.vy>0
    && player.x+player.w>boss.x+10 && player.x<boss.x+boss.w-10
    && player.y+player.h>boss.y && player.y+player.h<boss.y+18){
    boss.hp--;
    player.vy=JUMP*0.55;
    burst(boss.x+boss.w/2,boss.y,'#ff4400',8);
    score+=15;
    if (boss.hp<=0){ killCount+=3; score+=50; burst(boss.x+boss.w/2,boss.y+40,'#ffd700',20); boss=null; }
  }

  // Player vs Coins
  coins=coins.filter(c=>{
    const hit=player.x+player.w>c.x&&player.x<c.x+c.w&&player.y+player.h>c.y&&player.y<c.y+c.h;
    if (hit){ coinsCollected++; score+=5; burst(c.x+9,c.y+9,'#ffd700',8); return false; }
    return true;
  });

  // Draw entities
  for (const c of coins)  c.draw();
  for (const s of snakes) s.draw();
  if (boss) boss.draw();
  drawParticles();
  player.draw();
  drawHUD();

  // Wave done check (early)
  const cfg=WAVES[Math.min(wave,WAVES.length-1)];
  const waveDone=coinsCollected>=cfg.coinsNeeded&&killCount>=cfg.killsNeeded&&!boss;
  if (waveDone && waveDoneTimer<0) waveDoneTimer=150;
  if (waveDoneTimer>0){
    waveDoneTimer--;
    // Banner
    ctx.fillStyle='rgba(0,255,80,0.15)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    if (Math.floor(frameN/15)%2===0){
      ctx.fillStyle='#00ff44'; ctx.font='16px "Press Start 2P"';
      ctx.fillText('WAVE COMPLETE! BONUS TIME!',W/2,H/2-10);
      ctx.fillStyle='#ffd700'; ctx.font='10px "Press Start 2P"';
      ctx.fillText('SURVIVE FOR EXTRA POINTS!',W/2,H/2+20);
    }
    ctx.textAlign='left';
    if (waveDoneTimer<=0) gs='waveClear';
  }

  requestAnimationFrame(loop);
}

loop();
</script>

<script>
// Mobile controls — directly sets game keys object. Works on iOS Safari, Android Chrome, all browsers.
(function(){
  var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (!isTouchDevice) return;

  // Show mobile pad
  var pad = document.getElementById('mpad');
  if (pad) pad.style.display = 'block';

  // Update hint text
  var hint = document.getElementById('hint');
  if (hint) hint.textContent = 'USE BUTTONS BELOW TO PLAY!';

  // Resize canvas to leave room for controls
  var cvs = document.querySelector('canvas');
  if (cvs && window.innerHeight < 700) {
    cvs.style.maxHeight = (window.innerHeight - 140) + 'px';
    cvs.style.width = 'auto';
  }

  function bind(id, keyName) {
    var el = document.getElementById(id);
    if (!el) return;

    function down(e) {
      e.preventDefault();
      e.stopPropagation();
      window.keys[keyName] = true;
      el.style.opacity = '1';
      el.style.transform = 'scale(0.92)';
    }
    function up(e) {
      e.preventDefault();
      e.stopPropagation();
      window.keys[keyName] = false;
      el.style.opacity = '0.85';
      el.style.transform = 'scale(1)';
    }

    el.addEventListener('touchstart', down, {passive: false});
    el.addEventListener('touchend', up, {passive: false});
    el.addEventListener('touchcancel', up, {passive: false});
    // Also mouse for testing on desktop
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  }

  bind('ml', 'ArrowLeft');
  bind('mr', 'ArrowRight');
  bind('mj', ' ');

  // Tap ANYWHERE on screen = jump (except arrow buttons)
  document.addEventListener('touchstart', function(e) {
    var t = e.target;
    if (t.id === 'ml' || t.id === 'mr') return; // arrows handle themselves

    // During gameplay: tap = jump
    if (typeof gs !== 'undefined' && gs === 'play') {
      window.keys[' '] = true;
    }
    // Menu/waveclear/gameover: tap = start/next/restart
    if (typeof gs !== 'undefined' && (gs === 'menu' || gs === 'waveClear' || gs === 'gameOver')) {
      window.keys[' '] = true;
      try {
        if (gs === 'menu') startGame();
        if (gs === 'waveClear') nextWave();
        if (gs === 'gameOver') { wave = 0; score = 0; startGame(); }
      } catch(err) {}
    }
  }, {passive: true});

  document.addEventListener('touchend', function(e) {
    var t = e.target;
    if (t.id === 'ml' || t.id === 'mr') return;
    window.keys[' '] = false;
  }, {passive: true});

})();
</script>
